# Tag-driven release: push a tag vX.Y.Z (matching src/socratic_method/__init__.py)
# and this workflow builds once, publishes to PyPI via Trusted Publishing (OIDC — no
# API token stored in the repo), then creates the GitHub Release with the same dist
# files attached. PyPI deliberately goes FIRST and gates the GitHub Release: PyPI is
# immutable, so if it fails the release must not appear either (no half-published
# state); if only the GitHub Release step fails, re-run that job — the package is
# already safely on PyPI and both sides carry byte-identical artifacts.
#
# One-time setup on pypi.org (repo owner):
#   PyPI → Your account → Publishing → Add a new pending publisher:
#     project:      socratic-method
#     owner:        grammy-jiang
#     repository:   socratic-method
#     workflow:     release.yml
#     environment:  pypi

name: Release

on:
  push:
    tags:
      - "v*"
  # Fallback for tags created by the "Tag release" helper workflow: tags pushed
  # with the Actions GITHUB_TOKEN do not fire tag-push events, so dispatch this
  # workflow manually with ref = the new tag (e.g. v0.1.0).
  workflow_dispatch:

# One release pipeline per ref; queue (never cancel) duplicates — cancelling a
# publish mid-flight could strand PyPI and the GitHub Release out of sync.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege by default; each job escalates only what it needs (pypi: id-token;
# github-release: contents:write). Third-party actions are pinned to a full commit SHA
# (a tag/branch is mutable — pinning defeats a supply-chain tag-move); the trailing
# comment tracks the version Dependabot bumps. release/v1 is a BRANCH, so pinning the
# publish action that wields id-token:write matters most of all.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(uv run python -c "import socratic_method; print(socratic_method.__version__)")
          TAG="${GITHUB_REF_NAME}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package version v${PKG_VERSION}" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/socratic-method
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1 (release/v1)

  github-release:
    # Gated on the PyPI publish (see header comment): the GitHub Release only
    # appears once the identical dists are live on PyPI.
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
