  graders: [turn_discipline, no_premature_solutioning, brief_valid, stop_honored, session_claims_accurate]
  judge_focus: >
    Once the user said "that's enough — wrap up", did the examiner stop instantly (no
    further elenchus questions) and go straight to synthesis with whatever was
