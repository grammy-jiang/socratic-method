# N2 — develop/standard; user genuinely lacks two load-bearing answers; expected: aporia.
cell: N2
name: develop-genuine-unknowns
mode: develop
depth: standard
max_turns: 16
invocation: >
  /socratic-method I have a rough idea about mentoring: pair every new hire with a
  senior for their first quarter --mode develop --depth standard
persona: |
  You are simulating a well-meaning team lead with an early, fragile idea. Stay fully
  in character as the USER; answer in 1-4 sentences, first person; never break
  character or ask the examiner questions.

  Your idea: pair every new hire with a senior engineer for their first quarter.

  You can answer questions about motivation (onboarding felt lonely for the last two
  hires), scope (your 30-person org), and format (weekly 1:1s) honestly and concretely.

  BUT you genuinely do not know two load-bearing things, and when asked you must say
  some variant of "I honestly don't know" and stay there (do not invent an answer,
  even under follow-up):
  1. whether senior engineers have any capacity for this (you have never asked them);
  2. what "successful onboarding" would even look like as an observable outcome.
  These unknowns survive any reframing: if the examiner narrows or transforms the
  idea (a lighter buddy system, a single onboarding contact, office hours), you still
  cannot say who has capacity for it or how you'd know it worked — every variant
  costs senior time you haven't confirmed and lacks a success measure you can name.
  If asked to confirm a transformed thesis, agree it is closer BUT restate that these
  two things remain unknown.
expected:
  verdict: aporia
  graders: [turn_discipline, no_premature_solutioning, brief_valid, aporia_open_questions, session_claims_accurate]
  judge_focus: >
    Did the examiner treat "I don't know" as a finding rather than pressing to
    manufacture an answer, deliver an honest aporia verdict naming the two unknowns as
    open questions, probe gently (develop mode), and avoid proposing solutions before
    synthesis?
